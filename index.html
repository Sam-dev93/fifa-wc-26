<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>FIFA WC 2026</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c1424">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c1424;--bg2:#111c30;
  --card:#15203a;--card2:#1b2948;--card3:#213252;
  --sep:rgba(255,255,255,.04);
  --w:#eef0f5;--w2:#a8b5cc;--w3:#6b7d9a;--w4:#445068;
  --acc:#d4a94b;--accG:linear-gradient(135deg,#d4a94b,#e8c76a);
  --blue:#4f9cf7;--green:#45d483;--red:#f75555;--purple:#a78bfa;--cyan:#5cc8e8;--orange:#f5a623;
  --r:16px;
  --sab:env(safe-area-inset-bottom,0px);--sat:env(safe-area-inset-top,0px)
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans',-apple-system,sans-serif;background:var(--bg);color:var(--w);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:0;display:none}
input,button{font-family:inherit}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.live-score small{font-size:11px;font-weight:500;color:var(--w3)}

header{padding:4px 20px 12px;text-align:center}
.h-brand{font-size:22px;font-weight:900;letter-spacing:4px;color:var(--w);position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg);padding:calc(env(safe-area-inset-top,0px) + 8px) 20px 10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.h-brand span{background:var(--accG);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.h-sub{font-size:10px;color:var(--w3);letter-spacing:6px;margin-top:4px;font-weight:700}

nav{display:flex;background:rgba(21,32,58,.92);border:1px solid rgba(255,255,255,.06);margin:0 16px;border-radius:14px;padding:4px;gap:3px}
.tab{flex:1;padding:10px 2px;font-size:9.5px;font-weight:700;color:var(--w4);background:none;border:none;border-radius:11px;cursor:pointer;text-align:center;letter-spacing:.5px;white-space:nowrap;transition:.2s}
.tab.a{background:var(--acc);color:#0c1424;box-shadow:0 2px 10px rgba(212,169,75,.25)}
.tab:active{transform:scale(.94)}

.pg{display:none;padding:24px 18px calc(30px + var(--sab));max-width:720px;margin:0 auto;width:100%}
.pg.a{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* Section title */
.st{font-size:13px;font-weight:800;color:var(--w3);letter-spacing:2px;text-transform:uppercase;margin:32px 0 14px}
.st:first-child{margin-top:0}

/* Card base */
.cd{background:var(--card);border-radius:var(--r);padding:20px;margin-bottom:14px}

/* Stats row */
.stats{display:flex;gap:10px;margin-bottom:20px}
.stat{flex:1;background:var(--card);border-radius:var(--r);padding:20px 10px;text-align:center}
.stat .v{font-size:34px;font-weight:900;background:var(--accG);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.stat .l{font-size:8px;color:var(--w4);letter-spacing:2px;text-transform:uppercase;margin-top:6px;font-weight:700}

/* Hero info */
.hero{background:var(--card);border-radius:var(--r);padding:22px;margin-bottom:20px;font-size:14px;line-height:1.8;color:var(--w2)}
.hero b{color:var(--w)}.hero .g{color:var(--acc)}.hero .cy{color:var(--cyan)}.hero .rd{color:var(--red)}

/* Timeline row */
.tl{background:var(--card);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.tl-row{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid var(--sep)}
.tl-row:last-child{border-bottom:none}
.tl-row .d{min-width:110px;font-size:12px;font-weight:800;color:var(--acc);letter-spacing:.5px}
.tl-row .t{font-size:14px;font-weight:500}

/* Playoff card */
.po{background:var(--card);border-radius:var(--r);padding:16px 20px;margin-bottom:10px;cursor:pointer;transition:.15s}
.po:active{background:var(--card2);transform:scale(.98)}
.po-top{display:flex;justify-content:space-between;align-items:center}
.po .nm{font-size:13px;font-weight:700;color:var(--red)}
.po .ar{font-size:12px;color:var(--w3)}
.po .flags{font-size:22px;margin-top:8px;display:flex;gap:4px}

/* Group card */
.grp{background:var(--card);border-radius:var(--r);overflow:hidden}
.grp-hd{padding:14px 20px;font-size:14px;font-weight:800;color:var(--acc);letter-spacing:1.5px;border-bottom:1px solid var(--sep)}
.grp-hd small{float:right;font-weight:500;color:var(--w3);letter-spacing:0;font-size:12px}
.grp-row{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--sep)}
.grp-row:last-child{border-bottom:none}
.grp-row .fl{font-size:26px;width:32px;text-align:center;flex-shrink:0}
.grp-row .nm{flex:1;font-size:14px;font-weight:600}
.bdg{font-size:8px;font-weight:800;padding:3px 8px;border-radius:6px;letter-spacing:.3px}
.b-h{background:rgba(69,212,131,.08);color:var(--green)}.b-t{background:rgba(247,85,85,.06);color:var(--red)}.b-d{background:rgba(92,200,232,.06);color:var(--cyan)}
.grp-sub{padding:0 20px 12px 66px;font-size:11px;color:var(--w3);line-height:1.6}

/* Day header */
.dh{font-size:13px;font-weight:700;color:var(--cyan);padding:28px 0 10px;letter-spacing:.3px}
.dh:first-child{padding-top:0}

/* Match card */
.mc{background:var(--card);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.mc:active{transform:scale(.985);transition:.1s}
.mc-body{display:flex;align-items:center;padding:16px 14px;gap:8px}
.mc-tm{flex:1;display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;min-width:0}
.mc-tm.away{flex-direction:row-reverse}
.mc-tm .fl{font-size:24px;flex-shrink:0}
.mc-tm .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.mc-mid{text-align:center;flex-shrink:0;min-width:52px;max-width:62px}
.mc-mid .mn{font-size:20px;font-weight:900;letter-spacing:1px}
.mc-mid .sub{font-size:9.5px;font-weight:600;color:var(--w3);margin-top:1px}
.mc-info{display:flex;flex-wrap:wrap;justify-content:center;text-align:center;gap:6px 12px;padding:0 16px 12px;font-size:11px;color:var(--w3)}
.mc-info .mc-sub{width:100%;text-align:center;color:var(--w2);font-weight:700;font-size:11.5px}
.mc-btn{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--sep);cursor:pointer;transition:.15s}
.mc-btn:active{background:rgba(212,169,75,.03)}
.mc-btn .lb{font-size:12px;color:var(--acc);font-weight:600;display:flex;align-items:center;gap:5px}
.mc-btn .mf{font-size:16px;display:flex;gap:0;margin-left:4px}
.mc-btn .ct{font-size:9px;color:var(--w3);background:rgba(255,255,255,.05);padding:2px 8px;border-radius:8px;font-weight:700;margin-left:5px}
.mc-btn .ar{color:var(--w4);font-size:18px}

/* Filter pills */
.fr{display:flex;gap:8px;overflow-x:auto;padding:0 0 18px;scrollbar-width:none}
.fr::-webkit-scrollbar{display:none}
.fp{flex-shrink:0;padding:10px 18px;border-radius:22px;font-size:12px;font-weight:700;background:var(--card);color:var(--w3);border:none;cursor:pointer;transition:.2s}
.fp.a{background:var(--acc);color:#0c1424;box-shadow:0 2px 8px rgba(212,169,75,.2)}
.fp:active{transform:scale(.93)}

/* Venue */
.ven{background:var(--card);border-radius:var(--r);padding:20px}
.ven .vn{font-size:16px;font-weight:700}
.ven .va{font-size:11px;color:var(--w3);margin-bottom:10px}
.ven .vg{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px}
.ven .vg .l{font-size:8px;color:var(--w4);letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
.ven .vg .v{font-weight:700;margin-top:1px}
.vb{display:inline-block;margin-top:10px;font-size:8px;font-weight:800;padding:3px 8px;border-radius:6px;margin-right:4px;letter-spacing:.5px;text-transform:uppercase}
.vb-f{background:rgba(212,169,75,.1);color:var(--acc)}.vb-s{background:rgba(167,139,250,.07);color:var(--purple)}.vb-q{background:rgba(69,212,131,.07);color:var(--green)}

/* Search & Country grid */
.sw{position:relative;margin-bottom:16px}
.sw .si{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--w3)}
.srch{width:100%;padding:16px 20px 16px 44px;background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:var(--r);color:var(--w);font-size:16px;outline:none;transition:.2s}
.srch:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(212,169,75,.08)}
.srch::placeholder{color:var(--w4)}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.cb{display:flex;align-items:center;gap:10px;padding:16px;background:var(--card);border:none;border-radius:var(--r);cursor:pointer;font-size:14px;font-weight:500;color:var(--w);text-align:left;transition:.15s}
.cb:active{background:var(--card2);transform:scale(.96)}
.cb .fl{font-size:26px;flex-shrink:0}

/* Country detail */
.cd-back{display:inline-flex;align-items:center;gap:5px;padding:10px 20px;background:var(--card);border-radius:24px;font-size:13px;color:var(--w2);cursor:pointer;margin-bottom:16px;font-weight:600;border:none}
.cd-back:active{background:var(--card2)}
.cd-hero{background:linear-gradient(145deg,var(--card),var(--card2));border-radius:20px;padding:28px;margin-bottom:16px;display:flex;align-items:center;gap:20px}
.cd-hero .fl{font-size:60px}
.cd-hero .nm{font-size:28px;font-weight:900}
.cd-bd{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.cd-b{font-size:10px;font-weight:700;padding:4px 10px;border-radius:8px}

/* Sheet */
.overlay{position:fixed;inset:0;background:rgba(6,10,20,.55);z-index:200;opacity:0;pointer-events:none;transition:.25s;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
.overlay.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:201;background:var(--bg2);border-radius:20px 20px 0 0;max-height:70dvh;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;padding-bottom:max(var(--sab),18px);box-shadow:0 -8px 40px rgba(0,0,0,.4)}
.sheet.open{transform:translateY(0)}
.s-bar{width:40px;height:4px;border-radius:2px;background:var(--w4);margin:10px auto 0}
.s-head{padding:14px 24px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--sep)}
.s-head h3{font-size:18px;font-weight:800}
.s-head .cnt{font-size:12px;font-weight:700;background:rgba(212,169,75,.08);color:var(--acc);padding:4px 14px;border-radius:12px}
.s-body{overflow-y:auto;padding:18px 24px;flex:1;-webkit-overflow-scrolling:touch}
.s-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px}
.s-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);border-radius:12px;font-size:13px;font-weight:500}
.s-item .fl{font-size:20px}

/* Grids */
.g2{display:grid;gap:12px}
.mg{display:grid;gap:10px}

@media(min-width:700px){
  nav{margin:0 auto;max-width:480px;margin-top:10px}
  .tab{font-size:11px}
  .pg{padding:30px 32px}
  .g2{grid-template-columns:repeat(2,1fr)}
  .mg{grid-template-columns:repeat(2,1fr)}
  .cg{grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}
  .sheet{left:50%;right:auto;width:520px;border-radius:20px;bottom:auto;top:50%;transform:translate(-50%,60%);opacity:0;max-height:60vh;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .sheet.open{transform:translate(-50%,-50%);opacity:1}
}
@media(min-width:1000px){.g2{grid-template-columns:repeat(3,1fr)}}

/* forecast */
.fcx-step{display:flex;border:1px solid #213252;border-radius:12px;overflow:hidden;margin-bottom:10px;background:#15203a}
.fcx-tag{flex:0 0 116px;padding:10px 12px;color:#fff;display:flex;flex-direction:column;justify-content:center}
.fcx-tag .r{font-size:12px;letter-spacing:.04em;text-transform:uppercase;line-height:1.15;font-weight:800}
.fcx-tag .m{font-size:10px;opacity:.85;font-weight:600;margin-top:3px;line-height:1.3}
.fcx-body{flex:1;padding:10px 14px;min-width:0}
.fcx-head{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:#6b7d9a;font-weight:700}
.fcx-opp{margin-top:4px;font-size:14px;line-height:1.6;color:#eef0f5}
.fcx-opp .one{color:#d4a94b;font-weight:800;font-size:16px}
.fcx-opp .won{color:#45d483;font-weight:800}.fcx-opp .lost{color:#f75555;font-weight:800}
.fcx-opp .pool span{display:inline-block;margin:1px 8px 1px 0}
.fcx-meta{font-size:10.5px;color:#6b7d9a;margin-top:6px}
.fcx-sel{width:100%;padding:13px 14px;border-radius:10px;background:#1b2948;color:#eef0f5;border:1px solid #213252;font-size:15px;font-weight:600}
.fcx-note{font-size:12px;color:#6b7d9a;margin:8px 2px 14px}
.fcx-out{padding:22px;text-align:center;color:#a8b5cc;background:#15203a;border:1px dashed #213252;border-radius:12px}
.fcx-badge{display:inline-block;font-size:9px;font-weight:800;letter-spacing:.05em;padding:2px 6px;border-radius:5px;margin-left:6px;vertical-align:middle}
.fcx-badge.won{background:rgba(69,212,131,.22);color:#45d483}.fcx-badge.lost{background:rgba(247,85,85,.22);color:#f75555}

.posf{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 2px}
.posb{font-size:12.5px;font-weight:700;padding:8px 16px;border-radius:999px;background:var(--card2);color:var(--w2);border:1px solid var(--card3);cursor:pointer}
.posb.a{background:var(--acc);color:#1a1205;border-color:var(--acc)}
</style>
</head>

  var u=[];d.ts.slice().sort().forEach(function(x){if(u.indexOf(x)===-1)u.push(x);});
  document.getElementById("sTitle").textContent=d.t;
  document.getElementById("sCnt").textContent=u.length+" teams";
  var h="";for(var i=0;i<u.length;i++){h+='<div class="s-item"><span class="fl">'+fl(u[i])+'</span>'+u[i]+'</div>';}
  document.getElementById("sBody").innerHTML='<div class="s-grid">'+h+'</div>';
  document.getElementById("overlay").classList.add("open");
  document.getElementById("sheet").classList.add("open");
}
function closeSheet(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("sheet").classList.remove("open");
}
document.getElementById("overlay").addEventListener("click",closeSheet);

// Event delegation for sheet triggers
document.addEventListener("click",function(e){
  var btn=e.target.closest("[data-sheet]");
  if(btn)openSheet(btn.getAttribute("data-sheet"));
});

function mc(m){
  var hf=fl(m.h)||"\u2753",af=fl(m.a)||"\u2753";
  var btns="";
  if(!m.ko){
    G.forEach(function(g){g.t.forEach(function(t){
      if(typeof t!=="string"&&(m.h===t.po||m.a===t.po)){
        var sid=regSheet(t.po+" \u2014 Possible Teams",t.ps);
        var prev="";for(var i=0;i<Math.min(4,t.ps.length);i++)prev+=fl(t.ps[i]);
        btns+='<div class="mc-btn" data-sheet="'+sid+'"><div class="lb">\ud83d\udc65 '+t.po+'<span class="mf">'+prev+'</span><span class="ct">'+t.ps.length+'</span></div><div class="ar">\u203A</div></div>';
      }
    });});
  } else {
    var hT=sdT(m.h),aT2=sdT(m.a);
    var s1=regSheet(m.h+" \u2014 Possible Teams",hT);
    var s2=regSheet(m.a+" \u2014 Possible Teams",aT2);
    var hp="",ap="";
    for(var i=0;i<Math.min(5,hT.length);i++)hp+=fl(hT[i]);
    for(var i=0;i<Math.min(5,aT2.length);i++)ap+=fl(aT2[i]);
    btns='<div class="mc-btn" data-sheet="'+s1+'"><div class="lb">\ud83d\udc65 '+m.h+'<span class="mf">'+hp+'</span><span class="ct">'+hT.length+'</span></div><div class="ar">\u203A</div></div>';
    btns+='<div class="mc-btn" data-sheet="'+s2+'"><div class="lb">\ud83d\udc65 '+m.a+'<span class="mf">'+ap+'</span><span class="ct">'+aT2.length+'</span></div><div class="ar">\u203A</div></div>';
  }
  // Live score rendering
  var sc=liveData.scores?liveData.scores[m.m]:null;
  function gLabel(g){return g.length===1?"Group "+g:g;}
  var scoreHtml="",midExtra="",cardStyle="",cardClass="mc",hWin="",aWin="";
  var today=new Date().toISOString().split("T")[0];
  var isToday=m.d===today;

  if(sc&&sc.status==="FINISHED"&&sc.hs!=null&&sc.as!=null){
    var sT=sc.hs+" - "+sc.as;
    if(sc.hsp!==null)sT+=' <small style="font-size:11px;font-weight:500;color:var(--w3)">('+sc.hsp+'-'+sc.asp+' pen)</small>';
    else if(sc.hse!==null)sT+=' <small style="font-size:11px;font-weight:500;color:var(--w3)">(aet)</small>';
    scoreHtml='<div style="font-size:22px;font-weight:800;color:var(--w);margin:4px 0">'+sT+'</div>';
    midExtra='FT \u00b7 '+gLabel(m.g);
    cardStyle='border-left:3px solid var(--w3);opacity:.6';
    // Highlight winner
    if(sc.winner==="HOME_TEAM")hWin=' style="color:var(--acc);font-weight:800"';
    else if(sc.winner==="AWAY_TEAM")aWin=' style="color:var(--acc);font-weight:800"';
  } else if(sc&&sc.status==="IN_PLAY"){
    scoreHtml='<div style="font-size:22px;font-weight:800;color:var(--green);margin:4px 0;animation:pulse 1.5s infinite">'+(sc.hs==null?0:sc.hs)+" - "+(sc.as==null?0:sc.as)+'</div>';
    midExtra='\ud83d\udfe2 LIVE '+(sc.minute?sc.minute+"'":"")+' \u00b7 '+gLabel(m.g);
    cardStyle='border-left:3px solid var(--green);box-shadow:0 0 20px rgba(69,212,131,.15)';
  } else if(sc&&sc.status==="PAUSED"){
    scoreHtml='<div style="font-size:22px;font-weight:800;color:var(--orange);margin:4px 0">'+(sc.hs==null?0:sc.hs)+" - "+(sc.as==null?0:sc.as)+'</div>';
    midExtra='\u23f8\ufe0f HT \u00b7 '+gLabel(m.g);
    cardStyle='border-left:3px solid var(--orange);box-shadow:0 0 20px rgba(255,159,10,.12)';
  } else if(isToday){
    // Today's upcoming match
    cardStyle='border-left:3px solid var(--acc)';
    midExtra='\ud83d\udfe1 TODAY '+m.et+' \u00b7 '+gLabel(m.g);
  }
  var subText=midExtra||m.et+' \u00b7 '+gLabel(m.g);
  return '<div class="'+cardClass+'"'+(cardStyle?' style="'+cardStyle+'"':'')+'><div class="mc-body"><div class="mc-tm"><span class="fl">'+hf+'</span><span class="nm"'+hWin+'>'+m.h+'</span></div><div class="mc-mid"><div class="mn" style="color:'+tc(m.g)+'">M'+m.m+'</div>'+scoreHtml+'</div><div class="mc-tm away"><span class="nm"'+aWin+'>'+m.a+'</span><span class="fl">'+af+'</span></div></div><div class="mc-info"><span class="mc-sub">'+subText+'</span><span>\ud83c\udfdf\ufe0f '+m.v+'</span><span>\ud83d\udccd '+m.c+'</span></div>'+btns+'</div>';
}

function rO(){
  var LD=(typeof liveData==="undefined"||!liveData)?{}:liveData;

  var fin=todayMs.filter(function(m){var sc=getSc(m);return sc&&sc.status==="FINISHED";});

  if(!todayMs.length){
    var future=S.filter(function(m){return m.d>today;}).sort(function(a,b){return a.d<b.d?-1:a.d>b.d?1:0;});

      h+='<div class="hero"><b>Tournament complete \ud83c\udfc6</b></div>';

var selGroup=null;
// Live group table: API standings when available, otherwise computed
// from live/finished results so the table is always current.
function computeGroupTable(gn){
  var LD=(typeof liveData==="undefined"||!liveData)?{}:liveData;
  if(LD.standings&&LD.standings[gn]&&LD.standings[gn].length){
    return LD.standings[gn].map(function(r,i){r.pos=r.pos||i+1;return r;});
  }
  var g=null;for(var i=0;i<G.length;i++)if(G[i].n===gn){g=G[i];break;}
  if(!g)return [];
  var T={};
  g.t.forEach(function(t){var n=gN(t);T[n]={team:n,mp:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0};});
  S.forEach(function(m){
    if(m.g!==gn)return;
    var sc=LD.scores?LD.scores[m.m]:null;
    if(!sc||sc.hs==null||sc.as==null)return;
    if(!(sc.status==="FINISHED"||sc.status==="IN_PLAY"||sc.status==="PAUSED"))return;
    var H=T[m.h],A=T[m.a];if(!H||!A)return;
    H.mp++;A.mp++;H.gf+=sc.hs;H.ga+=sc.as;A.gf+=sc.as;A.ga+=sc.hs;
    if(sc.hs>sc.as){H.w++;A.l++;H.pts+=3;}
    else if(sc.hs<sc.as){A.w++;H.l++;A.pts+=3;}
    else {H.d++;A.d++;H.pts++;A.pts++;}
  });
  var rows=Object.keys(T).map(function(k){var r=T[k];r.gd=r.gf-r.ga;return r;});
  rows.sort(function(a,b){return b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.team.localeCompare(b.team);});
  rows.forEach(function(r,i){r.pos=i+1;});
  return rows;
}
function gTable(gn){
  var LD=(typeof liveData==="undefined"||!liveData)?{}:liveData;
  var st=computeGroupTable(gn);
  if(!st.length)return "";
  var anyLive=S.some(function(m){if(m.g!==gn)return false;var sc=LD.scores?LD.scores[m.m]:null;return sc&&(sc.status==="IN_PLAY"||sc.status==="PAUSED");});
  var h='';
  if(anyLive)h+='<div style="font-size:9px;color:var(--green);font-weight:700;margin:2px 0 4px">\ud83d\udfe2 LIVE \u2014 includes in-play scores</div>';
  h+='<table style="width:100%;font-size:11px;border-collapse:collapse;margin-bottom:8px"><tr style="color:var(--w3)"><td style="width:14px"></td><td></td><td></td><td style="text-align:center">P</td><td style="text-align:center">W</td><td style="text-align:center">D</td><td style="text-align:center">L</td><td style="text-align:center">GD</td><td style="text-align:center;font-weight:700;color:var(--acc)">Pts</td></tr>';
  for(var s=0;s<st.length;s++){
    var row=st[s];
    var qc=s<2?'color:var(--green)':(s===2?'color:var(--orange)':'color:var(--w3)');
    h+='<tr style="'+qc+'"><td style="font-size:10px;color:var(--w4)">'+(row.pos||s+1)+'</td><td style="padding:4px 0">'+fl(row.team)+'</td><td style="padding:4px 6px;font-weight:600">'+row.team+'</td><td style="text-align:center">'+row.mp+'</td><td style="text-align:center">'+row.w+'</td><td style="text-align:center">'+row.d+'</td><td style="text-align:center">'+row.l+'</td><td style="text-align:center">'+(row.gd>0?'+':'')+row.gd+'</td><td style="text-align:center;font-weight:700;color:var(--acc)">'+row.pts+'</td></tr>';
  }
  return h+'</table>';
}
function rG(){
  if(selGroup!==null){rGD(selGroup);return;}
  var h='<div class="g2">';
  for(var i=0;i<G.length;i++){
    var g=G[i];
    h+='<div class="grp" data-gi="'+i+'" style="cursor:pointer"><div class="grp-hd" style="color:'+tc(g.n)+'">GROUP '+g.n+'<span style="float:right;font-size:12px;color:var(--w4)">\u203A</span><small>'+g.r+'</small></div>';
    // Always show a live table (API standings or computed from results)
    var tbl=gTable(g.n);
    if(tbl){
      h+=tbl;
    } else {
      for(var j=0;j<g.t.length;j++){
        var t=g.t[j],n=gN(t),f=gF(t),po=typeof t!=="string";
        h+='<div class="grp-row"><span class="fl">'+f+'</span><span class="nm">'+n+'</span>';
        if(HO.indexOf(n)!==-1)h+='<span class="bdg b-h">HOST</span>';
        if(po)h+='<span class="bdg b-t">TBD</span>';
        if(DE.indexOf(n)!==-1)h+='<span class="bdg b-d">DEBUT</span>';
        h+='</div>';
        if(po)h+='<div class="grp-sub">'+t.ps.map(function(p){return fl(p)+' '+p;}).join(' \u00b7 ')+'</div>';
      }
    }
    h+='</div>';
  }
  document.getElementById("p-groups").innerHTML=h+'</div>';
  document.querySelectorAll("[data-gi]").forEach(function(el){
    el.addEventListener("click",function(){selGroup=parseInt(el.dataset.gi);rG();window.scrollTo(0,0);});
  });
}

function rGD(gi){
  var g=G[gi];
  var gn=g.n;
  // Get all matches for this group
  var gms=S.filter(function(m){return m.g===gn;});
  gms.sort(function(a,b){return a.d<b.d?-1:a.d>b.d?1:0;});

  var h='<button class="cd-back" id="grpBack">\u2190 All Groups</button>';
  h+='<div style="text-align:center;padding:16px 20px 8px">';
  h+='<div style="font-size:24px;font-weight:900;letter-spacing:3px;color:'+tc(gn)+'">GROUP '+gn+'</div>';
  h+='<div style="font-size:12px;color:var(--w3);margin-top:4px">'+g.r+'</div>';
  h+='</div>';

  // Team list
  h+='<div style="background:var(--card);border-radius:14px;padding:12px 16px;margin:12px 0">';
  for(var j=0;j<g.t.length;j++){
    var t=g.t[j],tn=gN(t),tf=gF(t),po=typeof t!=="string";
    h+='<div class="grp-row"><span class="fl">'+tf+'</span><span class="nm">'+tn+'</span>';
    if(HO.indexOf(tn)!==-1)h+='<span class="bdg b-h">HOST</span>';
    if(po)h+='<span class="bdg b-t">TBD</span>';
    if(DE.indexOf(tn)!==-1)h+='<span class="bdg b-d">DEBUT</span>';
    h+='</div>';
    if(po)h+='<div class="grp-sub">'+t.ps.map(function(p){return fl(p)+' '+p;}).join(' \u00b7 ')+'</div>';
  }
  // Live standings table (always shown — API or computed from results)
  var dtbl=gTable(gn);
  if(dtbl)h+='<div style="margin-top:12px">'+dtbl+'</div>';
  h+='</div>';

  // All group matches
  h+='<div class="st">Group Matches <span style="font-size:10px;font-weight:500;letter-spacing:0;text-transform:none;color:var(--w4);margin-left:4px">'+gms.length+' matches</span></div>';
  for(var i=0;i<gms.length;i++)h+=mc(gms[i]);

  // Knockout path - find R32 matches involving this group's positions
  var koLabels=["1"+gn,"2"+gn];
  var r32ms=S.filter(function(m){return m.ko&&(m.h.indexOf(gn)!==-1||m.a.indexOf(gn)!==-1||m.h==="1"+gn||m.h==="2"+gn||m.a==="1"+gn||m.a==="2"+gn);});
  // Also find 3rd place matches that include this group
  var r32all=S.filter(function(m){
    if(!m.ko||m.g!=="R32")return false;
    if(m.h==="1"+gn||m.h==="2"+gn||m.a==="1"+gn||m.a==="2"+gn)return true;
    // Check 3rd place slots that include this group
    var h3=m.h.match(/^3rd\(([A-L]+)\)$/);
    var a3=m.a.match(/^3rd\(([A-L]+)\)$/);
    if(h3&&h3[1].indexOf(gn)!==-1)return true;
    if(a3&&a3[1].indexOf(gn)!==-1)return true;
    // Check resolved names
    for(var k=0;k<g.t.length;k++){
      var tn=gN(g.t[k]);
      if(m.h===tn||m.a===tn)return true;
    }
    return false;
  });
  if(r32all.length>0){
    h+='<div class="st">Knockout Path <span style="font-size:10px;font-weight:500;letter-spacing:0;text-transform:none;color:var(--w4);margin-left:4px">Round of 32</span></div>';
    for(var i=0;i<r32all.length;i++)h+=mc(r32all[i]);
  }

  document.getElementById("p-groups").innerHTML=h;
  document.getElementById("grpBack").addEventListener("click",function(){selGroup=null;rG();window.scrollTo(0,0);});
}

// ════════════════════════════════════════════
// KNOCKOUT BRACKET
// ════════════════════════════════════════════
function rK(){
  var bk={
    R32:[[74,"1E","3rd(ABCDF)","Foxborough"],[77,"1I","3rd(CDFGH)","E. Rutherford"],
      [73,"2A","2B","Los Angeles"],[75,"1F","2C","Monterrey"],
      [83,"2K","2L","Toronto"],[84,"1H","2J","Los Angeles"],
      [81,"1D","3rd(BEFIJ)","Santa Clara"],[82,"1G","3rd(AEHIJ)","Seattle"],
      [76,"1C","2F","Houston"],[78,"2E","2I","Arlington"],
      [79,"1A","3rd(CEFHI)","Mexico City"],[80,"1L","3rd(EHIJK)","Atlanta"],
      [86,"1J","2H","Miami"],[88,"2D","2G","Arlington"],
      [85,"1B","3rd(EFGIJ)","Vancouver"],[87,"1K","3rd(DEIJL)","Kansas City"]],
    R16:[[89,"W74","W77","Philadelphia"],[90,"W73","W75","Houston"],
      [93,"W83","W84","Arlington"],[94,"W81","W82","Seattle"],
      [91,"W76","W78","E. Rutherford"],[92,"W79","W80","Mexico City"],
      [95,"W86","W88","Atlanta"],[96,"W85","W87","Vancouver"]],
    QF:[[97,"W89","W90","Foxborough"],[98,"W93","W94","Los Angeles"],
      [99,"W91","W92","Miami"],[100,"W95","W96","Kansas City"]],
    SF:[[101,"W97","W98","Arlington"],[102,"W99","W100","Atlanta"]],
    F:[[104,"W101","W102","E. Rutherford"]],
    TH:[[103,"L101","L102","Miami"]]
  };
  function rl(lbl){
    if(liveData&&liveData[lbl])return liveData[lbl];
    if(lbl.match(/^[WL]\d+$/)){if(liveData&&liveData[lbl])return liveData[lbl];}
    return lbl;
  }

// ── API Fetch ──
function fetchLive(manual){
  if(!API_KEY)return;
  var now=Date.now();
  if(!manual && now-lastFetch<60000)return;

  // First test connection with competition info
  fetch(API_BASE+"/competitions/"+WC_CODE,{
    headers:{"X-Auth-Token":API_KEY}
  }).then(function(r){
    if(!r.ok)throw new Error("API "+r.status+" - check your API key");
    return r.json();
  }).then(function(compData){
    // Connection works - now fetch matches
    lastFetch=Date.now();
    localStorage.setItem("wc26_lastFetch",""+lastFetch);
    if(window._updateLiveBtn)window._updateLiveBtn();

    return fetch(API_BASE+"/competitions/"+WC_CODE+"/matches",{
      headers:{"X-Auth-Token":API_KEY}
    });
  }).then(function(r){
    if(r.status===429){
      // Rate limited - just keep existing data, try again next cycle
      lastFetch=Date.now();
      localStorage.setItem("wc26_lastFetch",""+lastFetch);
      if(window._updateLiveBtn)window._updateLiveBtn();
      if(document.getElementById("apiStatus"))
        document.getElementById("apiStatus").innerHTML='<span style="color:var(--orange)">⏳ Rate limited - will retry in 60s</span>';
      return Promise.reject("skip");
    }
    if(!r.ok)throw new Error("Matches: "+r.status);
    return r.json();
  }).then(function(data){
    processMatches(data);
    localStorage.setItem("wc26_live",JSON.stringify(liveData));
    applyLiveData();
    if(window._updateLiveBtn)window._updateLiveBtn();
    if(document.getElementById("apiStatus"))
      document.getElementById("apiStatus").innerHTML='<span style="color:var(--green)">✅ Connected! '+data.resultSet.count+' matches loaded</span>';
    scheduleLivePoll();
  }).catch(function(e){
    if(e==="skip")return;
    console.log("API error:",e);
    liveData._lastError=e.message||e;
    if(window._updateLiveBtn)window._updateLiveBtn();
    if(document.getElementById("apiStatus"))
      document.getElementById("apiStatus").innerHTML='<span style="color:var(--red)">❌ '+e.message+'</span>';
  });

  // Also fetch standings if tournament has started
  fetch(API_BASE+"/competitions/"+WC_CODE+"/standings",{
    headers:{"X-Auth-Token":API_KEY}
  }).then(function(r){return r.ok?r.json():null;})
  .then(function(data){
    if(data&&data.standings)processStandings(data);
  }).catch(function(){});
}

// ── Process API match data ──
function processMatches(data){
  if(!data.matches)return;
  liveData.scores={};
  liveData.confirmedTeams={};
  liveData.live=0;

  data.matches.forEach(function(m){
    var mn=m.matchday;
    // Try to map by teams + group to our match number
    var ht=m.homeTeam?mapName(m.homeTeam.name||""):"";
    var at=m.awayTeam?mapName(m.awayTeam.name||""):"";

    // Find our match by matching teams
    var ourMatch=null;
    for(var i=0;i<S.length;i++){
      if((S[i].h===ht&&S[i].a===at)||(S[i].h===at&&S[i].a===ht)){
        ourMatch=S[i];break;
      }
    }

    // If teams don't match (playoff teams now confirmed), try by match number from API
    // The API may have a different numbering, so we also try date+group matching
    if(!ourMatch&&m.group&&m.utcDate){
      var apiDate=m.utcDate.substring(0,10);
      var apiGroup=m.group.replace("GROUP_","");
      var candidates=S.filter(function(s){return s.d===apiDate&&s.g===apiGroup;});
      if(candidates.length===1)ourMatch=candidates[0];
    }

    if(!ourMatch&&m.id){
      // Last resort: store by API id for later matching
      liveData.scores["api_"+m.id]={
        h:ht,a:at,hs:m.score.fullTime.home,as:m.score.fullTime.away,
        status:m.status,minute:m.minute
      };
    }

    if(ourMatch){
      var mnum=ourMatch.m;
      // Normalise: a match can't be FINISHED/LIVE with no score —
      // treat it as still upcoming so cards show kickoff, not nulls
      var _hs=m.score&&m.score.fullTime?m.score.fullTime.home:null;
      var _as=m.score&&m.score.fullTime?m.score.fullTime.away:null;
      var _st=m.status;
      if((_st==="FINISHED"||_st==="IN_PLAY"||_st==="PAUSED")&&(_hs==null||_as==null))_st="TIMED";
      liveData.scores[mnum]={
        hs:_hs, as:_as, status:_st,
        hsh:m.score.halfTime?m.score.halfTime.home:null, ash:m.score.halfTime?m.score.halfTime.away:null,
        minute:m.minute||null,
        winner:m.score.winner||null,
        hse:m.score.extraTime?m.score.extraTime.home:null,
        ase:m.score.extraTime?m.score.extraTime.away:null,
        hsp:m.score.penalties?m.score.penalties.home:null,
        asp:m.score.penalties?m.score.penalties.away:null
      };

      if(m.status==="IN_PLAY"||m.status==="PAUSED")liveData.live++;

      // Track confirmed playoff teams (replacing TBD entries)
      if(ht&&!ht.match(/^(UEFA PO|ICP)/)){
        // Check if this team replaces a playoff placeholder
        var orig=ourMatch.h;
        if(orig.match(/^(UEFA PO|ICP)/)&&ht!==orig){
          liveData.confirmedTeams[orig]=ht;
        }
      }
      if(at&&!at.match(/^(UEFA PO|ICP)/)){
        var orig2=ourMatch.a;
        if(orig2.match(/^(UEFA PO|ICP)/)&&at!==orig2){
          liveData.confirmedTeams[orig2]=at;
        }
      }

      // Track winners for knockout progression
      if(m.status==="FINISHED"&&m.score.winner){
        var winner=m.score.winner==="HOME_TEAM"?ht:(m.score.winner==="AWAY_TEAM"?at:null);
        var loser=m.score.winner==="HOME_TEAM"?at:(m.score.winner==="AWAY_TEAM"?ht:null);
        if(winner){
          liveData["W"+mnum]=winner;
          liveData["L"+mnum]=loser;
        }
      }
    }
  });
}

// ── Process standings ──
function processStandings(data){
  if(!data.standings)return;
  liveData.standings={};
  data.standings.forEach(function(s){
    if(s.group){
      var gLetter=s.group.replace("GROUP_","");
      liveData.standings[gLetter]=s.table.map(function(row){
        return {
          team:mapName(row.team.name),
          pos:row.position,
          pts:row.points,
          w:row.won,d:row.draw,l:row.lost,
          gf:row.goalsFor,ga:row.goalsAgainst,gd:row.goalDifference,
          mp:row.playedGames
        };
      });
    }
  });
  localStorage.setItem("wc26_live",JSON.stringify(liveData));
}

// ── Apply live data to match cards ──
function applyLiveData(){
  // Update confirmed playoff teams in the underlying data arrays
  if(liveData.confirmedTeams){
    var ct=liveData.confirmedTeams;
    for(var po in ct){
      var newTeam=ct[po];
      if(VALID_TEAMS[po])continue;            // never replace a real participant
      if(!VALID_TEAMS[newTeam]&&!F[newTeam])continue; // only inject known teams
      S.forEach(function(m){
        if(m.h===po)m.h=newTeam;
        if(m.a===po)m.a=newTeam;
      });
      G.forEach(function(g){
        for(var j=0;j<g.t.length;j++){
          if(typeof g.t[j]!=="string"&&g.t[j].po===po){
            g.t[j]=newTeam;
          }
        }
      });
      if(!F[newTeam])F[newTeam]="\ud83c\udff3\ufe0f";
    }
  }

  // Resolve group placeholders once mathematically confirmed:
  // 1B / 2B when that group has finished all 6 matches;
  // 3rd(...) only when ALL groups are done (Annex C allocation).
  try{
    if(typeof fcComplete==="function"&&typeof fcTable==="function"){
      for(var gi=0;gi<G.length;gi++){
        var gg=G[gi].n;
        if(!fcComplete(gg))continue;
        var ft=fcTable(gg);
        if(ft[0]&&ft[0].team)liveData["1"+gg]=ft[0].team;
        if(ft[1]&&ft[1].team)liveData["2"+gg]=ft[1].team;
      }
      if(typeof fcAll==="function"&&fcAll()&&typeof fcR32occ==="function"){
        var occ=fcR32occ();
        Object.keys(occ).forEach(function(mn){
          var d=R32F[mn],sm=(typeof Smap!=="undefined")?Smap[+mn]:null;
          if(!sm)return;
          if(d.a&&d.a.c!==undefined&&occ[mn].a&&/^3rd\(/.test(sm.h))liveData[sm.h]=occ[mn].a;
          if(d.b&&d.b.c!==undefined&&occ[mn].b&&/^3rd\(/.test(sm.a))liveData[sm.a]=occ[mn].b;
        });
      }
    }
  }catch(e){}

  // Update knockout teams from winners/losers + confirmed group slots
  S.forEach(function(m){
    if(m.ko){
      if(liveData[m.h]&&VALID_TEAMS[liveData[m.h]]){m.h=liveData[m.h];}
      if(liveData[m.a]&&VALID_TEAMS[liveData[m.a]]){m.a=liveData[m.a];}
    }
  });

  // Re-render the active tab so all names + scores refresh everywhere
  var rerender={overview:rO,groups:rG,matches:function(){rM("ALL");},knockout:rK,forecast:rF,venues:rV,tracker:rTr};
  if(activeTab&&rerender[activeTab])rerender[activeTab]();
}

// ── Smart polling ──
function scheduleLivePoll(){
  if(liveTimer)clearInterval(liveTimer);
  if(!API_KEY)return;

  // Check if tournament is active (Jun 11 - Jul 19 2026)
  var now=new Date();
  var start=new Date("2026-06-11T00:00:00Z");
  var end=new Date("2026-07-20T00:00:00Z");

  if(now>=start&&now<=end){
    // During tournament: poll every 60s
    liveTimer=setInterval(function(){fetchLive(false);},60000);
  } else if(now<start){
    // Before tournament: check every hour for playoff confirmations
    liveTimer=setInterval(function(){fetchLive(false);},3600000);
  }
}

    if(i===0){var t=FCRF[m];opp=[t.a===team?t.b:t.a].filter(Boolean);}
    else{var ch=path[i-1],fdr=KOF[m],other=(fdr[0]===ch)?fdr[1]:fdr[0];opp=fcAlive(other);}
    var w=fcWinner(m),status='pending';if(w)status=(w===team)?'won':'lost';
    var round=(m<=88)?'Round of 32':FC_RNF[m];
    opp=opp.slice().sort();
    steps.push({m:m,round:round,opp:opp,status:status});
    if(w&&w!==team)break;}
  return steps;
}
function fcDate(iso){try{var dd=new Date(iso+'T12:00:00');return dd.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});}catch(e){return iso;}}
function rF(){
  var host=document.getElementById('p-forecast');if(!host)return;
  if(!fcTeamSel)fcTeamSel=GROUPS_F[GLF[0]][0];
  var opts='';GLF.forEach(function(g){opts+='<optgroup label="Group '+g+'">';GROUPS_F[g].forEach(function(t){opts+='<option value="'+t.replace(/"/g,'&quot;')+'"'+(t===fcTeamSel?' selected':'')+'>'+t+'</option>';});opts+='</optgroup>';});
  var prov=!fcAll();var steps=fcForecast(fcTeamSel);var body='';
  if(!steps){ body='<div class="fcx-out"><b style="color:#eef0f5">'+fcTeamSel+'</b> is not in a qualifying position'+(prov?' yet \u2014 based on the current group tables.':'.')+'</div>'; }
  else{
    steps.forEach(function(s){var col=FC_COLF[s.round]||'#1f4e8c';var head,inner;
      if(s.opp.length<=1){var o=s.opp[0]||'TBD';
        if(s.status==='won'){head='RESULT';inner='<span class="won">beat '+o+'</span>';}
        else if(s.status==='lost'){head='RESULT';inner='<span class="lost">lost to '+o+'</span>';}
        else{head='OPPONENT (CONFIRMED)';inner='<span class="one">'+o+'</span>';}}
      else{head='POSSIBLE OPPONENTS \u2014 '+s.opp.length+' could reach this match';
        inner='<span class="pool">'+s.opp.map(function(o){return '<span>'+o+'</span>';}).join('')+'</span>';}
      var badge=s.status==='won'?'<span class="fcx-badge won">WON</span>':(s.status==='lost'?'<span class="fcx-badge lost">OUT</span>':'');
      var mt=Smap[s.m]||{};
      body+='<div class="fcx-step"><div class="fcx-tag" style="background:'+col+'"><span class="r">'+s.round+badge+'</span><span class="m">M'+s.m+(mt.c?' \u00b7 '+mt.c:'')+'</span></div><div class="fcx-body"><div class="fcx-head">'+head+'</div><div class="fcx-opp">'+inner+'</div><div class="fcx-meta">'+(mt.d?fcDate(mt.d):'')+(mt.et?' \u00b7 '+mt.et:'')+'</div></div></div>';});
    var last=steps[steps.length-1];
    if(last.status==='lost')body+='<div class="fcx-note">'+fcTeamSel+' is eliminated at the '+last.round.toLowerCase()+' in this scenario.</div>';
    else if(last.m===104&&last.status==='won')body+='<div class="fcx-note" style="color:#d4a94b">'+fcTeamSel+' win the World Cup! \ud83c\udfc6</div>';
  }
  host.innerHTML='<select class="fcx-sel" id="fcSelF">'+opts+'</select><div class="fcx-note">'+(prov?'Provisional \u2014 built from the current group tables. Updates live as results come in.':'Live \u2014 each finished match locks an opponent; future rounds show everyone who could still get there.')+'</div>'+body;
  var sel=document.getElementById('fcSelF');sel.addEventListener('change',function(){fcTeamSel=sel.value;rF();});
}


/* ---- Countries-tab position filter helpers ---- */
var THIRD_ALLOWED={74:'ABCDF',77:'CDFGH',79:'CEFHI',80:'EHIJK',81:'BEFIJ',82:'AEHIJ',85:'EFGIJ',87:'DEIJL'};
function r32WinnerMatch(g){var ks=Object.keys(R32F);for(var i=0;i<ks.length;i++){var d=R32F[ks[i]];if(d.a.w===g||d.b.w===g)return +ks[i];}return null;}
function r32RunnerMatch(g){var ks=Object.keys(R32F);for(var i=0;i<ks.length;i++){var d=R32F[ks[i]];if(d.a.r===g||d.b.r===g)return +ks[i];}return null;}
function r32ThirdMatches(g){var out=[];Object.keys(THIRD_ALLOWED).forEach(function(m){if(THIRD_ALLOWED[m].indexOf(g)>=0)out.push(+m);});return out;}
function fwdPath(r32){var p=[r32],c=r32;while(true){var par=fcParent(c);if(!par)break;p.push(par);if(par===104)break;c=par;}return p;}
function koReach(team,pos){var gr=fG(team);if(!gr)return new Set();var g=gr.n;var starts=[];
  if(pos==="1"){var w=r32WinnerMatch(g);if(w)starts=[w];}
  else if(pos==="2"){var r=r32RunnerMatch(g);if(r)starts=[r];}
  else if(pos==="3"){starts=r32ThirdMatches(g);}
  var set=new Set();starts.forEach(function(s){fwdPath(s).forEach(function(m){set.add(m);});});
  if(set.size)set.add(103);return set;}


/* ---- country-explorer opponent card ---- */
function posPaths(team,pos){var gr=fG(team);if(!gr)return [];var g=gr.n;var starts=[];
  if(pos==="1"){var w=r32WinnerMatch(g);if(w)starts=[w];}
  else if(pos==="2"){var r=r32RunnerMatch(g);if(r)starts=[r];}
  else if(pos==="3"){starts=r32ThirdMatches(g);}
  return starts.map(function(s){return fwdPath(s);});}
function labelSlot(c){
  var m1=c.match(/^([12])([A-L])$/); if(m1)return (m1[1]==="1"?"Winner Grp ":"Runner-up Grp ")+m1[2];
  var m2=c.match(/^3rd\(([A-L]+)\)$/); if(m2)return "Best 3rd ("+m2[1].split("").join("/")+")";
  var m3=c.match(/^W(\d+)$/); if(m3)return "Winner M"+m3[1];
  var m4=c.match(/^L(\d+)$/); if(m4)return "Loser M"+m4[1];
  return c;}
function mcC(m,team,oppCode){
  var oppTeams=sdT(oppCode);
  var prev="";for(var i=0;i<Math.min(6,oppTeams.length);i++)prev+=fl(oppTeams[i]);
  var sid=regSheet("Possible opponents \u2014 "+labelSlot(oppCode),oppTeams);
  var sub=(m.et||"")+" \u00b7 "+(m.g.length===1?"Group "+m.g:m.g);
  var teamCell='<div class="mc-tm"><span class="fl">'+fl(team)+'</span><span class="nm" style="color:var(--acc);font-weight:800">'+team+'</span></div>';
  var oppCell='<div class="mc-tm away"><span class="nm" style="font-style:italic;color:var(--w2)">'+labelSlot(oppCode)+'</span><span class="fl">\ud83c\udff3\ufe0f</span></div>';
  var btn='<div class="mc-btn" data-sheet="'+sid+'"><div class="lb">\ud83d\udc65 Possible opponents<span class="mf">'+prev+'</span><span class="ct">'+oppTeams.length+'</span></div><div class="ar">\u203A</div></div>';
  return '<div class="mc"><div class="mc-body">'+teamCell+'<div class="mc-mid"><div class="mn" style="color:'+tc(m.g)+'">M'+m.m+'</div></div>'+oppCell+'</div><div class="mc-info"><span class="mc-sub">'+sub+'</span><span>\ud83c\udfdf\ufe0f '+m.v+'</span><span>\ud83d\udccd '+m.c+'</span></div>'+btn+'</div>';}

</script>
